name: 📊 GitHub Metrics — LUGRAM

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1. STATS GÉNÉRALES + LANGAGES
      # ─────────────────────────────────────────────
      - name: 🔵 Stats générales + Top langages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.svg
          user: LUGRAM
          template: classic
          base: header, activity, community, repositories
          config_timezone: Africa/Libreville
          config_display: large
          config_animations: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github

      # ─────────────────────────────────────────────
      # 2. CALENDRIER ISOMÉTRIQUE 3D
      # ─────────────────────────────────────────────
      - name: 🔵 Calendrier isométrique
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.isocalendar.svg
          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ─────────────────────────────────────────────
      # 3. HABITUDES DE CODE — CORRIGÉ
      #    • plugin_habits_from augmenté à 500 pour éviter "not enough data"
      #    • plugin_habits_facts: no  → désactive la section qui plante
      #    • plugin_habits_charts_type: classic  → plus stable
      # ─────────────────────────────────────────────
      - name: 🔴 Habitudes de code
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.habits.svg
          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville
          plugin_habits: yes
          plugin_habits_from: 500          # analyse jusqu'à 500 events (au lieu de 200)
          plugin_habits_days: 30           # fenêtre élargie à 30 jours
          plugin_habits_facts: no          # ← désactivé : cause de l'erreur sur peu d'activité
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

      # ─────────────────────────────────────────────
      # 4. TOPICS (starred topics visibles sur profil)
      # ─────────────────────────────────────────────
      - name: 🔴 Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.topics.svg
          user: LUGRAM
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 24
          plugin_topics_mode: icons        # affiche les icônes de tes topics GitHub étoilés
          plugin_topics_sort: stars

      # ─────────────────────────────────────────────
      # 5. ACHIEVEMENTS — CORRIGÉ
      #    • plugin_achievements_secrets: no  → n'affiche pas les achievements privés
      #    • plugin_achievements_display: compact  → plus stable que "detailed"
      #    • Nécessite scope read:user dans le PAT
      # ─────────────────────────────────────────────
      - name: 🟡 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.achievements.svg
          user: LUGRAM
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C    # affiche C et au-dessus
          plugin_achievements_secrets: no     # ← désactivé : évite l'erreur de permissions
          plugin_achievements_display: compact
          plugin_achievements_limit: 6        # limite à 6 pour éviter le timeout
