name: 📊 GitHub Metrics — LUGRAM

on:
  # Mise à jour automatique chaque jour à 00h00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Mise à jour manuelle depuis l'onglet Actions
  workflow_dispatch:
  # Mise à jour à chaque push sur main
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1. STATS GÉNÉRALES + LANGAGES
      #    → github/metrics.svg
      # ─────────────────────────────────────────────
      - name: 🔵 Stats générales + Top langages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.svg

          # Paramètres utilisateur
          user: LUGRAM
          template: classic
          base: header, activity, community, repositories

          # Apparence
          config_timezone: Africa/Libreville
          config_display: large
          config_animations: yes

          # Plugin : Top langages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          # Plugin : Activité récente
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, release

      # ─────────────────────────────────────────────
      # 2. CALENDRIER DE CONTRIBUTIONS (isometric 3D)
      #    → github/metrics.isocalendar.svg
      # ─────────────────────────────────────────────
      - name: 🔵 Calendrier isométrique 3D
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.isocalendar.svg

          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ─────────────────────────────────────────────
      # 3. HABITUDES DE CODE (heures, jours, commits)
      #    → github/metrics.habits.svg
      # ─────────────────────────────────────────────
      - name: 🔴 Habitudes de code
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.habits.svg

          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

      # ─────────────────────────────────────────────
      # 4. TOPICS & TECHNOLOGIES MAÎTRISÉES
      #    → github/metrics.topics.svg
      # ─────────────────────────────────────────────
      - name: 🔴 Topics & Technologies
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.topics.svg

          user: LUGRAM
          base: ""

          plugin_topics: yes
          plugin_topics_limit: 24
          plugin_topics_mode: icons
          plugin_topics_sort: stars

      # ─────────────────────────────────────────────
      # 5. DÉPÔTS ÉPINGLÉS (projets mis en avant)
      #    → github/metrics.repositories.svg
      # ─────────────────────────────────────────────
      - name: 🔴 Dépôts épinglés
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.repositories.svg

          user: LUGRAM
          base: ""

          plugin_repositories: yes
          plugin_repositories_featured: LUGRAM/ESchoolPay

      # ─────────────────────────────────────────────
      # 6. RÉSUMÉ DE PROFIL (achievements + stats clés)
      #    → github/metrics.achievements.svg
      # ─────────────────────────────────────────────
      - name: 🟡 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.achievements.svg

          user: LUGRAM
          base: ""

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          
