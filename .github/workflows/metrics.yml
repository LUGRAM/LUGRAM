name: 📊 GitHub Metrics — LUGRAM

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1. STATS GÉNÉRALES + LANGAGES
      #    ✅ Fonctionne même avec peu d'activité
      # ─────────────────────────────────────────────
      - name: 🔵 Stats générales + Top langages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.svg
          user: LUGRAM
          template: classic
          base: header, repositories          # ← "activity" retiré (plantait)
          config_timezone: Africa/Libreville
          config_display: large
          config_animations: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_colors: github

      # ─────────────────────────────────────────────
      # 2. CALENDRIER ISOMÉTRIQUE 3D
      #    ✅ Fonctionne (tu le vois déjà)
      # ─────────────────────────────────────────────
      - name: 🔵 Calendrier isométrique
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.isocalendar.svg
          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ─────────────────────────────────────────────
      # 3. DÉPÔTS ÉPINGLÉS
      #    ✅ Fonctionne indépendamment de l'activité
      # ─────────────────────────────────────────────
      - name: 🔴 Dépôts épinglés
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.repositories.svg
          user: LUGRAM
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: LUGRAM/LUGRAM   # ← remplace par ton vrai repo projet

      # ─────────────────────────────────────────────
      # 4. TOPICS ÉTOILÉS
      #    ✅ Basé sur les topics que tu étoiles sur GitHub
      #    → Va sur github.com/topics et étoile des topics
      #      (flutter, laravel, dart, php, docker, devops...)
      # ─────────────────────────────────────────────
      - name: 🔴 Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.topics.svg
          user: LUGRAM
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          plugin_topics_sort: stars

      # ─────────────────────────────────────────────
      # 5. PROFIL COMPLET (header + repos + langages combinés)
      #    ✅ Remplacement de habits + achievements
      # ─────────────────────────────────────────────
      - name: 🟡 Profil étendu
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.profile.svg
          user: LUGRAM
          base: ""
          config_timezone: Africa/Libreville
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage
          plugin_languages_sections: most-used, recently-used
          plugin_stars: yes                   # ← tes repos étoilés
          plugin_stars_limit: 4
